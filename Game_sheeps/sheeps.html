<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Sheep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bark: #3E1F12;
            --ring: #E8912D;
            --ring-lt: #F5B455;
            --cream: #F3E0BD;
            --leaf: #2E8B57;
            --berry: #D94A3D;
        }

        * {
            box-sizing: border-box;
        }

        /* The page never scrolls, so no key can shift the view */
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 14px;
            font-family: 'Fredoka', 'Trebuchet MS', sans-serif;
            color: var(--cream);
            background:
                repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.06) 0 2px, rgba(0, 0, 0, 0) 2px 26px),
                linear-gradient(180deg, #4A2716 0%, #2B160C 100%);
        }

        /* game panel and the instructions side by side */
        .stage {
            display: flex;
            align-items: stretch;
            gap: 16px;
        }

        .topbar {
            width: 100%;
            max-width: 1160px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border: 3px solid var(--bark);
            border-radius: 999px;
            background: var(--ring);
            color: var(--bark);
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            box-shadow: 0 4px 0 var(--bark);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .back:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--bark);
        }

        .back:focus-visible {
            outline: 3px solid var(--cream);
            outline-offset: 3px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--ring-lt);
            text-shadow: 3px 3px 0 var(--bark);
        }

        .panel {
            background: var(--cream);
            border: 6px solid var(--bark);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 10px 0 var(--bark), 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 12px;
            padding: 0 6px;
            color: var(--bark);
            font-size: 19px;
            font-weight: 600;
        }

        .hud .right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .hearts {
            display: flex;
            gap: 6px;
            font-size: 26px;
            line-height: 1;
        }

        .heart {
            color: var(--berry);
            text-shadow: 2px 2px 0 var(--bark);
        }

        .heart.empty {
            color: #C9B58C;
            text-shadow: 2px 2px 0 rgba(62, 31, 18, 0.35);
        }

        canvas {
            display: block;
            border: 5px solid var(--bark);
            border-radius: 14px;
            background: #EFD9AE;
            max-width: 100%;
            max-height: calc(100vh - 190px);
            /* shrink instead of overflowing */
            outline: none;
            cursor: crosshair;
        }

        /* ---------- instructions on the right ---------- */
        .sidebar {
            width: 210px;
            flex: none;
            background: rgba(243, 224, 189, 0.07);
            border: 4px solid rgba(243, 224, 189, 0.22);
            border-radius: 20px;
            padding: 16px 16px 18px;
        }

        .sidebar h2 {
            margin: 0 0 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--ring-lt);
        }

        .sidebar dl {
            margin: 0;
        }

        .sidebar dt {
            margin-bottom: 5px;
        }

        .sidebar dd {
            margin: 0 0 14px;
            font-size: 13.5px;
            font-weight: 400;
            color: #C9A87C;
        }

        kbd {
            display: inline-block;
            margin-right: 4px;
            padding: 3px 8px;
            border: 2px solid var(--bark);
            border-radius: 7px;
            background: var(--ring);
            color: var(--bark);
            font-family: inherit;
            font-size: 12.5px;
            font-weight: 600;
            box-shadow: 0 2px 0 var(--bark);
        }

        kbd.wide {
            background: var(--cream);
        }

        .sidebar .goal {
            margin: 4px 0 0;
            padding-top: 14px;
            border-top: 3px solid rgba(243, 224, 189, 0.18);
            font-size: 13.5px;
            font-weight: 400;
            line-height: 1.45;
            color: #C9A87C;
        }

        @media (max-width: 1180px) {
            .sidebar {
                display: none;
            }

            /* narrow screens: the game comes first */
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a class="back" href="../menu.html">&larr; All games</a>
        <div class="title">
            <svg width="38" height="38" viewBox="0 0 46 46" aria-hidden="true">
                <circle cx="23" cy="23" r="20" fill="#E8912D" stroke="#3E1F12" stroke-width="4" />
                <circle cx="23" cy="23" r="13" fill="none" stroke="#3E1F12" stroke-width="2.5" />
                <circle cx="23" cy="23" r="7" fill="none" stroke="#3E1F12" stroke-width="2.5" />
                <circle cx="23" cy="23" r="2" fill="#3E1F12" />
            </svg>
            <h1>Escape the Sheep</h1>
        </div>
    </div>

    <div class="stage">

        <div class="panel">
            <div class="hud">
                <div class="hearts" id="hearts"></div>
                <div class="right">
                    <div id="kills">0 sheep</div>
                    <div id="timer">0.0s</div>
                    <div id="best">best 0.0s</div>
                </div>
            </div>
            <canvas id="game" width="900" height="560" tabindex="0"></canvas>
        </div>

        <aside class="sidebar">
            <h2>Controls</h2>
            <dl>
                <dt><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></dt>
                <dd>Move around the field</dd>

                <dt><kbd class="wide">Mouse</kbd></dt>
                <dd>Aim the pitchfork</dd>

                <dt><kbd>R</kbd></dt>
                <dd>Start a new run</dd>

                <dt><kbd>H</kbd></dt>
                <dd>Show the hitboxes</dd>
            </dl>
            <p class="goal">
                Sheep charge in from the corners. Stab them before they reach you,
                grab apples to get a heart back, and stay alive as long as you can.
            </p>
        </aside>

    </div>

    <script>
        /* =========================================================
           1. SETTINGS — tweak these numbers to change the game
           ========================================================= */
        const SETTINGS = {
            playerSpeed: 5.0,
            playerSize: 52,
            sheepSize: 54,
            appleSize: 40,

            // Hitbox size as a share of the sprite.
            // Lower = more forgiving. Press H in game to see the circles.
            playerHitbox: 0.55,
            sheepHitbox: 0.70,
            appleHitbox: 0.85,   // generous, picking up should feel easy

            // The pitchfork: a circle placed in front of the player,
            // in the direction of the mouse. Sheep touching it die.
            forkDistance: 28,     // how far in front of the player
            forkRadius: 20,     // how wide the killing area is

            startHearts: 3,      // hearts at the start of a run
            maxHearts: 3,      // apples stop healing above this

            invulnMs: 900,    // invulnerability after a hit, milliseconds
            blinkMs: 110,    // white blink speed while invulnerable

            sheepSpeed: 2.4,    // sheep speed at the start
            sheepAccel: 0.05,   // extra speed per second survived
            sheepDelay: 80,     // frames between sheep at the start
            sheepDelayMin: 22,     // fastest possible spawn rate

            appleEvery: 380,    // frames between apples (~6 seconds)
            appleLife: 480     // how long an apple stays on the field
        };

        /* =========================================================
           1b. IMAGE FILE NAMES
           Change these lines if your files are named differently.
           Paths are relative to this html file.
           ========================================================= */
        const IMAGE_FILES = {
            human: 'images/lp_farmer.png',
            sheep: 'images/lp_sheep.png',
            apple: 'images/lp_apple.png'
        };

        /* =========================================================
           1c. WHICH WAY THE SPRITES POINT
           Every sprite is drawn once, pointing somewhere. The game
           rotates it from there, so it needs to know the starting
           direction. 'down' means the front of the drawing (the
           pitchfork) points at the bottom of the image.
           If a sprite looks turned by 90 degrees in game,
           change its word here — nothing else.
           ========================================================= */
        const SPRITE_FACING = {
            human: 'down',   // the pitchfork points down in lp_farmer.png
            sheep: 'up'      // the sheep's head is at the top of lp_sheep.png
        };

        // How much extra rotation each starting direction needs
        const FACING_OFFSET = {
            right: 0,
            down: -Math.PI / 2,
            left: Math.PI,
            up: Math.PI / 2
        };

        /* =========================================================
           2. IMAGES
           A missing file is not an error — the game draws a simple
           shape instead, so it always runs.
           ========================================================= */
        function loadImage(src) {
            const img = new Image();
            img.onload = () => img.ready = true;
            img.onerror = () => {
                img.ready = false;
                console.warn('Image not found: ' + src + ' — using a fallback shape');
            };
            img.src = src;
            return img;
        }

        const IMAGES = {
            human: loadImage(IMAGE_FILES.human),
            sheep: loadImage(IMAGE_FILES.sheep),
            apple: loadImage(IMAGE_FILES.apple)
        };

        // White copy of a sprite, used for the damage blink
        function whiteVersion(img) {
            if (img.whiteCache) return img.whiteCache;
            const c = document.createElement('canvas');
            c.width = img.width;
            c.height = img.height;
            const cx = c.getContext('2d');
            cx.drawImage(img, 0, 0);
            cx.globalCompositeOperation = 'source-atop';  // paint only the drawing itself
            cx.fillStyle = '#ffffff';
            cx.fillRect(0, 0, c.width, c.height);
            img.whiteCache = c;
            return c;
        }

        /* =========================================================
           3. GAME STATE
           ========================================================= */
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const heartsEl = document.getElementById('hearts');
        const timerEl = document.getElementById('timer');
        const bestEl = document.getElementById('best');
        const killsEl = document.getElementById('kills');

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: SETTINGS.playerSize,
            hitbox: SETTINGS.playerHitbox,
            hp: SETTINGS.startHearts,
            invulnUntil: 0,   // timestamp until which hits are ignored
            angle: 0          // radians, points at the mouse
        };

        // The killing area in front of the player. Rebuilt every frame.
        const fork = {
            x: 0, y: 0,
            size: SETTINGS.forkRadius * 2,
            hitbox: 1
        };

        let sheep = [];
        let apples = [];
        let puffs = [];        // small effect when a sheep is removed
        let started = false;   // the run begins on the first click or key press
        let alive = true;
        let startTime = 0;
        let survived = 0;
        let best = 0;
        let kills = 0;
        let sheepTimer = 0;
        let appleTimer = 0;
        let showHitboxes = false;

        const mouse = { x: canvas.width / 2 + 100, y: canvas.height / 2 };

        /* =========================================================
           4. INPUT
           e.code is the physical key on the keyboard, so the game
           works on any keyboard layout. e.key would give the letter
           the layout produces, which breaks outside English.
           ========================================================= */
        const keys = {};

        function startGame() {
            if (started) return;
            started = true;
            startTime = Date.now();
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            startGame();
            if (e.code === 'KeyR') restart();
            if (e.code === 'KeyH') showHitboxes = !showHitboxes;
            // Space and the arrows scroll the page by default — not here
            if (e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
        });

        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mouse position inside the canvas.
        // The canvas can be displayed smaller than its real size,
        // so the coordinates are scaled back to game units.
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('mousedown', () => {
            canvas.focus();   // makes sure the keyboard talks to the game
            startGame();
        });

        window.addEventListener('load', () => canvas.focus());

        /* =========================================================
           5. SHEEP AND APPLES
           ========================================================= */
        const corners = [
            { x: 0, y: 0 },
            { x: canvas.width, y: 0 },
            { x: 0, y: canvas.height },
            { x: canvas.width, y: canvas.height }
        ];

        function spawnSheep() {
            const c = corners[Math.floor(Math.random() * 4)];
            const dx = player.x - c.x;
            const dy = player.y - c.y;
            const len = Math.hypot(dx, dy);
            const speed = SETTINGS.sheepSpeed + survived * SETTINGS.sheepAccel;

            sheep.push({
                x: c.x, y: c.y,
                size: SETTINGS.sheepSize,
                hitbox: SETTINGS.sheepHitbox,
                vx: (dx / len) * speed,
                vy: (dy / len) * speed,
                angle: Math.atan2(dy, dx)   // the sheep faces where it runs
            });
        }

        function spawnApple() {
            const m = 50; // keep apples away from the walls
            apples.push({
                x: m + Math.random() * (canvas.width - m * 2),
                y: m + Math.random() * (canvas.height - m * 2),
                size: SETTINGS.appleSize,
                hitbox: SETTINGS.appleHitbox,
                life: SETTINGS.appleLife
            });
        }

        /* Circle collision: compare the distance between two centres
           with the sum of the two radii. */
        function radiusOf(obj) {
            return (obj.size / 2) * obj.hitbox;
        }

        function isTouching(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y) < radiusOf(a) + radiusOf(b);
        }

        /* =========================================================
           6. UPDATE
           ========================================================= */
        function restart() {
            sheep = [];
            apples = [];
            puffs = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.hp = SETTINGS.startHearts;
            player.invulnUntil = 0;
            alive = true;
            started = true;
            startTime = Date.now();
            kills = 0;
            sheepTimer = 0;
            appleTimer = 0;
            killsEl.textContent = '0 sheep';
            drawHearts();
        }

        function drawHearts() {
            heartsEl.innerHTML = '';
            for (let i = 0; i < SETTINGS.maxHearts; i++) {
                const s = document.createElement('span');
                s.className = 'heart' + (i < player.hp ? '' : ' empty');
                s.textContent = '♥';
                heartsEl.appendChild(s);
            }
        }

        function update() {
            // effects keep animating even on the start and game over screens
            for (const p of puffs) p.life--;
            puffs = puffs.filter(p => p.life > 0);

            if (!started || !alive) return;
            const now = Date.now();
            survived = (now - startTime) / 1000;

            // --- movement, normalised so diagonals are not faster ---
            let dx = 0, dy = 0;
            if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

            const len = Math.hypot(dx, dy);
            if (len > 0) {
                player.x += (dx / len) * SETTINGS.playerSpeed;
                player.y += (dy / len) * SETTINGS.playerSpeed;
            }

            const half = player.size / 2;
            player.x = Math.max(half, Math.min(canvas.width - half, player.x));
            player.y = Math.max(half, Math.min(canvas.height - half, player.y));

            // --- aim at the mouse ---
            // atan2 gives the angle from the player to the mouse, in radians
            player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

            // --- place the pitchfork in front of the player ---
            fork.x = player.x + Math.cos(player.angle) * SETTINGS.forkDistance;
            fork.y = player.y + Math.sin(player.angle) * SETTINGS.forkDistance;

            // --- spawn sheep, faster over time ---
            sheepTimer++;
            const delay = Math.max(SETTINGS.sheepDelayMin, SETTINGS.sheepDelay - survived * 2);
            if (sheepTimer >= delay) { spawnSheep(); sheepTimer = 0; }

            // --- spawn apples ---
            appleTimer++;
            if (appleTimer >= SETTINGS.appleEvery) { spawnApple(); appleTimer = 0; }

            // --- move sheep and keep them facing their direction ---
            for (const s of sheep) {
                s.x += s.vx;
                s.y += s.vy;
                s.angle = Math.atan2(s.vy, s.vx);
            }

            // --- the pitchfork removes any sheep it touches ---
            sheep = sheep.filter(s => {
                if (isTouching(fork, s)) {
                    puffs.push({ x: s.x, y: s.y, life: 20 });
                    kills++;
                    killsEl.textContent = kills + ' sheep';
                    return false;   // drop this sheep from the list
                }
                return true;
            });

            // --- drop the sheep that left the field ---
            sheep = sheep.filter(s =>
                s.x > -150 && s.x < canvas.width + 150 &&
                s.y > -150 && s.y < canvas.height + 150
            );

            // --- apples expire ---
            for (const a of apples) a.life--;

            // --- picking up an apple ---
            for (const a of apples) {
                if (isTouching(player, a)) {
                    if (player.hp < SETTINGS.maxHearts) player.hp++;
                    a.life = 0;
                    drawHearts();
                }
            }
            apples = apples.filter(a => a.life > 0);

            // --- taking a hit, ignored while invulnerable ---
            if (now > player.invulnUntil) {
                for (const s of sheep) {
                    if (isTouching(player, s)) {
                        player.hp--;
                        player.invulnUntil = now + SETTINGS.invulnMs;
                        drawHearts();
                        if (player.hp <= 0) {
                            alive = false;
                            if (survived > best) {
                                best = survived;
                                bestEl.textContent = 'best ' + best.toFixed(1) + 's';
                            }
                        }
                        break;
                    }
                }
            }

            timerEl.textContent = survived.toFixed(1) + 's';
        }

        /* =========================================================
           7. DRAWING
           ========================================================= */

        /* Draws a sprite rotated to `rotation` radians.
           The rotation already includes the sprite's starting
           direction, see SPRITE_FACING above. */
        function drawSprite(img, obj, rotation, options = {}) {
            const { white = false } = options;

            if (img.ready) {
                const src = white ? whiteVersion(img) : img;
                ctx.save();
                ctx.translate(obj.x, obj.y);
                ctx.rotate(rotation);
                ctx.drawImage(src, -obj.size / 2, -obj.size / 2, obj.size, obj.size);
                ctx.restore();
            } else if (options.fallback) {
                options.fallback(white);
            }
        }

        function fallbackCircle(obj, fill) {
            ctx.fillStyle = fill;
            ctx.strokeStyle = '#3E1F12';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.size / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }

        function drawHitbox(obj, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, radiusOf(obj), 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawField() {
            ctx.fillStyle = '#EFD9AE';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(168, 90, 42, 0.13)';
            ctx.lineWidth = 2;
            for (let y = 34; y < canvas.height; y += 46) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function centerText(big, small) {
            ctx.textAlign = 'center';
            ctx.fillStyle = '#F5B455';
            ctx.font = '700 44px Fredoka, sans-serif';
            ctx.fillText(big, canvas.width / 2, canvas.height / 2 - 6);

            ctx.fillStyle = '#F3E0BD';
            ctx.font = '500 19px Fredoka, sans-serif';
            ctx.fillText(small, canvas.width / 2, canvas.height / 2 + 32);
        }

        function draw() {
            drawField();

            // ---- apples ----
            for (const a of apples) {
                if (a.life < 90 && Math.floor(a.life / 8) % 2 === 0) continue;  // blink before vanishing
                drawSprite(IMAGES.apple, a, 0, { fallback: () => fallbackCircle(a, '#D94A3D') });
                if (showHitboxes) drawHitbox(a, '#2E8B57');
            }

            // ---- puffs left by dead sheep ----
            for (const p of puffs) {
                const t = 1 - p.life / 20;            // 0 at the start, 1 at the end
                ctx.strokeStyle = 'rgba(62, 31, 18, ' + (1 - t) * 0.7 + ')';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 10 + t * 34, 0, Math.PI * 2);
                ctx.stroke();
            }

            // ---- sheep, turned towards the player ----
            for (const s of sheep) {
                drawSprite(IMAGES.sheep, s, s.angle + FACING_OFFSET[SPRITE_FACING.sheep], {
                    fallback: () => fallbackCircle(s, '#F7F1E4')
                });
                if (showHitboxes) drawHitbox(s, '#D94A3D');
            }

            // ---- player ----
            const now = Date.now();
            const invuln = now < player.invulnUntil;
            const whitePhase = invuln && Math.floor(now / SETTINGS.blinkMs) % 2 === 0;

            drawSprite(IMAGES.human, player, player.angle + FACING_OFFSET[SPRITE_FACING.human], {
                white: whitePhase,
                fallback: (white) => fallbackCircle(player, white ? '#FFFFFF' : '#2E8B57')
            });

            if (showHitboxes) {
                drawHitbox(player, '#1D6FB8');
                drawHitbox(fork, '#8E44AD');
            }

            // ---- overlays ----
            if (!started) {
                ctx.fillStyle = 'rgba(62, 31, 18, 0.72)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                centerText('Escape the Sheep', 'Click the field or press any key to start');
            } else if (!alive) {
                ctx.fillStyle = 'rgba(62, 31, 18, 0.82)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                centerText('The sheep win',
                    'Survived ' + survived.toFixed(1) + 's · ' + kills +
                    ' sheep stopped — press R to try again');
            }
        }

        /* =========================================================
           8. MAIN LOOP
           ========================================================= */
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        drawHearts();
        loop();
    </script>

</body>

</html>
