<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Sheep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bark: #3E1F12;
            --ring: #E8912D;
            --ring-lt: #F5B455;
            --cream: #F3E0BD;
            --leaf: #2E8B57;
            --berry: #D94A3D;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 18px;
            font-family: 'Fredoka', 'Trebuchet MS', sans-serif;
            color: var(--cream);
            background:
                repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.06) 0 2px, rgba(0, 0, 0, 0) 2px 26px),
                linear-gradient(180deg, #4A2716 0%, #2B160C 100%);
        }

        .topbar {
            width: 100%;
            max-width: 940px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border: 3px solid var(--bark);
            border-radius: 999px;
            background: var(--ring);
            color: var(--bark);
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            box-shadow: 0 4px 0 var(--bark);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .back:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--bark);
        }

        .back:focus-visible {
            outline: 3px solid var(--cream);
            outline-offset: 3px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--ring-lt);
            text-shadow: 3px 3px 0 var(--bark);
        }

        .panel {
            background: var(--cream);
            border: 6px solid var(--bark);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 10px 0 var(--bark), 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 12px;
            padding: 0 6px;
            color: var(--bark);
            font-size: 19px;
            font-weight: 600;
        }

        .hearts {
            display: flex;
            gap: 6px;
            font-size: 26px;
            line-height: 1;
        }

        .heart {
            color: var(--berry);
            text-shadow: 2px 2px 0 var(--bark);
        }

        .heart.empty {
            color: #C9B58C;
            text-shadow: 2px 2px 0 rgba(62, 31, 18, 0.35);
        }

        canvas {
            display: block;
            border: 5px solid var(--bark);
            border-radius: 14px;
            background: #EFD9AE;
            max-width: 100%;
            outline: none;
        }

        .hint {
            font-size: 14px;
            font-weight: 500;
            color: #C9A87C;
            text-align: center;
        }

        .hint b {
            color: var(--ring-lt);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a class="back" href="../menu.html">&larr; All games</a>
        <div class="title">
            <svg width="38" height="38" viewBox="0 0 46 46" aria-hidden="true">
                <circle cx="23" cy="23" r="20" fill="#E8912D" stroke="#3E1F12" stroke-width="4" />
                <circle cx="23" cy="23" r="13" fill="none" stroke="#3E1F12" stroke-width="2.5" />
                <circle cx="23" cy="23" r="7" fill="none" stroke="#3E1F12" stroke-width="2.5" />
                <circle cx="23" cy="23" r="2" fill="#3E1F12" />
            </svg>
            <h1>Escape the Sheep</h1>
        </div>
    </div>

    <div class="panel">
        <div class="hud">
            <div class="hearts" id="hearts"></div>
            <div id="timer">0.0s</div>
            <div id="best">best 0.0s</div>
        </div>
        <canvas id="game" width="900" height="560" tabindex="0"></canvas>
    </div>

    <div class="hint">
        <b>W A S D</b> or arrows to move · <b>R</b> to restart · apples restore a heart · <b>H</b> shows hitboxes
    </div>

    <script>
        /* =========================================================
           1. SETTINGS — tweak these numbers to change the game
           ========================================================= */
        const SETTINGS = {
            playerSpeed: 5.0,
            playerSize: 52,
            sheepSize: 54,
            appleSize: 40,

            // Hitbox size as a share of the sprite.
            // Lower = more forgiving. Press H in game to see the circles.
            playerHitbox: 0.55,
            sheepHitbox: 0.70,
            appleHitbox: 0.85,   // generous, picking up should feel easy

            startHearts: 3,      // hearts at the start of a run
            maxHearts: 3,      // apples stop healing above this

            invulnMs: 900,    // invulnerability after a hit, milliseconds
            blinkMs: 110,    // white blink speed while invulnerable

            sheepSpeed: 2.4,    // sheep speed at the start
            sheepAccel: 0.05,   // extra speed per second survived
            sheepDelay: 80,     // frames between sheep at the start
            sheepDelayMin: 22,     // fastest possible spawn rate

            appleEvery: 380,    // frames between apples (~6 seconds)
            appleLife: 480     // how long an apple stays on the field
        };

        /* =========================================================
           1b. IMAGE FILE NAMES
           Change these lines if your files are named differently.
           Paths are relative to this html file.
           ========================================================= */
        const IMAGE_FILES = {
            human: 'images/lp_farmer.png',
            sheep: 'images/lp_sheep.png',
            apple: 'images/lp_apple.png'
        };

        /* =========================================================
           2. IMAGES
           A missing file is not an error — the game draws a simple
           shape instead, so it always runs.
           ========================================================= */
        function loadImage(src) {
            const img = new Image();
            img.onload = () => img.ready = true;
            img.onerror = () => {
                img.ready = false;
                console.warn('Image not found: ' + src + ' — using a fallback shape');
            };
            img.src = src;
            return img;
        }

        const IMAGES = {
            human: loadImage(IMAGE_FILES.human),
            sheep: loadImage(IMAGE_FILES.sheep),
            apple: loadImage(IMAGE_FILES.apple)
        };

        // White copy of a sprite, used for the damage blink
        function whiteVersion(img) {
            if (img.whiteCache) return img.whiteCache;
            const c = document.createElement('canvas');
            c.width = img.width;
            c.height = img.height;
            const cx = c.getContext('2d');
            cx.drawImage(img, 0, 0);
            cx.globalCompositeOperation = 'source-atop';  // paint only the drawing itself
            cx.fillStyle = '#ffffff';
            cx.fillRect(0, 0, c.width, c.height);
            img.whiteCache = c;
            return c;
        }

        /* =========================================================
           3. GAME STATE
           ========================================================= */
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const heartsEl = document.getElementById('hearts');
        const timerEl = document.getElementById('timer');
        const bestEl = document.getElementById('best');

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: SETTINGS.playerSize,
            hitbox: SETTINGS.playerHitbox,
            hp: SETTINGS.startHearts,
            invulnUntil: 0,   // timestamp until which hits are ignored
            facing: 1         // 1 = facing right, -1 = facing left
        };

        let sheep = [];
        let apples = [];
        let alive = true;
        let paused = false;
        let pausedAt = 0;
        let startTime = Date.now();
        let survived = 0;
        let best = 0;
        let sheepTimer = 0;
        let appleTimer = 0;
        let showHitboxes = false;

        /* =========================================================
           4. INPUT
           The page must have keyboard focus, otherwise key presses
           go somewhere else. Clicking the canvas takes focus back.
           ========================================================= */
        const keys = {};

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            keys[k] = true;
            if (k === 'r') restart();
            if (k === 'h') showHitboxes = !showHitboxes;
            // stop arrow keys from scrolling the page
            if (k.startsWith('arrow')) e.preventDefault();
        });

        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function pauseGame() {
            if (paused) return;
            paused = true;
            pausedAt = Date.now();
            for (const k in keys) keys[k] = false;   // drop stuck keys
        }

        function resumeGame() {
            if (!paused) return;
            startTime += Date.now() - pausedAt;      // the pause does not count as time survived
            paused = false;
        }

        // Pause when the window loses focus, resume when it comes back
        window.addEventListener('blur', pauseGame);
        window.addEventListener('focus', resumeGame);

        canvas.addEventListener('mousedown', () => {
            canvas.focus();
            resumeGame();
        });

        // Live Server opens the page with focus still in the editor or address bar
        if (!document.hasFocus()) pauseGame();
        window.addEventListener('load', () => canvas.focus());

        /* =========================================================
           5. SHEEP AND APPLES
           ========================================================= */
        const corners = [
            { x: 0, y: 0 },
            { x: canvas.width, y: 0 },
            { x: 0, y: canvas.height },
            { x: canvas.width, y: canvas.height }
        ];

        function spawnSheep() {
            const c = corners[Math.floor(Math.random() * 4)];
            const dx = player.x - c.x;
            const dy = player.y - c.y;
            const len = Math.hypot(dx, dy);
            const speed = SETTINGS.sheepSpeed + survived * SETTINGS.sheepAccel;

            sheep.push({
                x: c.x, y: c.y,
                size: SETTINGS.sheepSize,
                hitbox: SETTINGS.sheepHitbox,
                vx: (dx / len) * speed,
                vy: (dy / len) * speed
            });
        }

        function spawnApple() {
            const m = 50; // keep apples away from the walls
            apples.push({
                x: m + Math.random() * (canvas.width - m * 2),
                y: m + Math.random() * (canvas.height - m * 2),
                size: SETTINGS.appleSize,
                hitbox: SETTINGS.appleHitbox,
                life: SETTINGS.appleLife
            });
        }

        /* Circle collision.
           x and y are the centre of every object now, so the distance
           between two centres is compared to the sum of the radii. */
        function radiusOf(obj) {
            return (obj.size / 2) * obj.hitbox;
        }

        function isTouching(a, b) {
            const dist = Math.hypot(a.x - b.x, a.y - b.y);
            return dist < radiusOf(a) + radiusOf(b);
        }

        /* =========================================================
           6. UPDATE
           ========================================================= */
        function restart() {
            sheep = [];
            apples = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.hp = SETTINGS.startHearts;
            player.invulnUntil = 0;
            alive = true;
            startTime = Date.now();
            if (paused) pausedAt = startTime;
            sheepTimer = 0;
            appleTimer = 0;
            drawHearts();
        }

        function drawHearts() {
            heartsEl.innerHTML = '';
            for (let i = 0; i < SETTINGS.maxHearts; i++) {
                const s = document.createElement('span');
                s.className = 'heart' + (i < player.hp ? '' : ' empty');
                s.textContent = '♥';
                heartsEl.appendChild(s);
            }
        }

        function update() {
            if (!alive || paused) return;
            const now = Date.now();
            survived = (now - startTime) / 1000;

            // --- movement, normalised so diagonals are not faster ---
            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1;
            if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1;
            if (keys['d'] || keys['arrowright']) dx += 1;

            const len = Math.hypot(dx, dy);
            if (len > 0) {
                player.x += (dx / len) * SETTINGS.playerSpeed;
                player.y += (dy / len) * SETTINGS.playerSpeed;
                if (dx !== 0) player.facing = dx > 0 ? 1 : -1;
            }

            // keep the player inside the field (x, y are the centre)
            const half = player.size / 2;
            player.x = Math.max(half, Math.min(canvas.width - half, player.x));
            player.y = Math.max(half, Math.min(canvas.height - half, player.y));

            // --- spawn sheep, faster over time ---
            sheepTimer++;
            const delay = Math.max(SETTINGS.sheepDelayMin, SETTINGS.sheepDelay - survived * 2);
            if (sheepTimer >= delay) { spawnSheep(); sheepTimer = 0; }

            // --- spawn apples ---
            appleTimer++;
            if (appleTimer >= SETTINGS.appleEvery) { spawnApple(); appleTimer = 0; }

            // --- move sheep, drop the ones that left the field ---
            for (const s of sheep) { s.x += s.vx; s.y += s.vy; }
            sheep = sheep.filter(s =>
                s.x > -150 && s.x < canvas.width + 150 &&
                s.y > -150 && s.y < canvas.height + 150
            );

            // --- apples expire ---
            for (const a of apples) a.life--;

            // --- picking up an apple ---
            for (const a of apples) {
                if (isTouching(player, a)) {
                    if (player.hp < SETTINGS.maxHearts) player.hp++;
                    a.life = 0;
                    drawHearts();
                }
            }
            apples = apples.filter(a => a.life > 0);

            // --- taking a hit, ignored while invulnerable ---
            if (now > player.invulnUntil) {
                for (const s of sheep) {
                    if (isTouching(player, s)) {
                        player.hp--;
                        player.invulnUntil = now + SETTINGS.invulnMs;
                        drawHearts();
                        if (player.hp <= 0) {
                            alive = false;
                            if (survived > best) {
                                best = survived;
                                bestEl.textContent = 'best ' + best.toFixed(1) + 's';
                            }
                        }
                        break;
                    }
                }
            }

            timerEl.textContent = survived.toFixed(1) + 's';
        }

        /* =========================================================
           7. DRAWING
           ========================================================= */

        // Draws the sprite centred on obj.x / obj.y
        function drawSprite(img, obj, options = {}) {
            const { flip = 1, white = false } = options;

            if (img.ready) {
                const src = white ? whiteVersion(img) : img;
                ctx.save();
                ctx.translate(obj.x, obj.y);
                ctx.scale(flip, 1);
                ctx.drawImage(src, -obj.size / 2, -obj.size / 2, obj.size, obj.size);
                ctx.restore();
            } else if (options.fallback) {
                options.fallback(white);
            }
        }

        // Simple circle used when a sprite file is missing
        function fallbackCircle(obj, fill) {
            ctx.fillStyle = fill;
            ctx.strokeStyle = '#3E1F12';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.size / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }

        function drawHitbox(obj, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, radiusOf(obj), 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawField() {
            ctx.fillStyle = '#EFD9AE';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(168, 90, 42, 0.13)';
            ctx.lineWidth = 2;
            for (let y = 34; y < canvas.height; y += 46) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function centerText(big, small) {
            ctx.textAlign = 'center';
            ctx.fillStyle = '#F5B455';
            ctx.font = '700 44px Fredoka, sans-serif';
            ctx.fillText(big, canvas.width / 2, canvas.height / 2 - 6);

            ctx.fillStyle = '#F3E0BD';
            ctx.font = '500 19px Fredoka, sans-serif';
            ctx.fillText(small, canvas.width / 2, canvas.height / 2 + 32);
        }

        function draw() {
            drawField();

            // ---- apples ----
            for (const a of apples) {
                if (a.life < 90 && Math.floor(a.life / 8) % 2 === 0) continue;  // blink before vanishing
                drawSprite(IMAGES.apple, a, { fallback: () => fallbackCircle(a, '#D94A3D') });
                if (showHitboxes) drawHitbox(a, '#2E8B57');
            }

            // ---- sheep, mirrored to match their direction ----
            for (const s of sheep) {
                drawSprite(IMAGES.sheep, s, {
                    flip: s.vx > 0 ? 1 : -1,
                    fallback: () => fallbackCircle(s, '#F7F1E4')
                });
                if (showHitboxes) drawHitbox(s, '#D94A3D');
            }

            // ---- player ----
            const now = Date.now();
            const invuln = now < player.invulnUntil;
            const whitePhase = invuln && Math.floor(now / SETTINGS.blinkMs) % 2 === 0;

            drawSprite(IMAGES.human, player, {
                flip: player.facing,
                white: whitePhase,
                fallback: (white) => fallbackCircle(player, white ? '#FFFFFF' : '#2E8B57')
            });
            if (showHitboxes) drawHitbox(player, '#1D6FB8');

            // ---- overlays ----
            if (!alive) {
                ctx.fillStyle = 'rgba(62, 31, 18, 0.82)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                centerText('The sheep win',
                    'Survived ' + survived.toFixed(1) + 's — press R to try again');
            } else if (paused) {
                ctx.fillStyle = 'rgba(62, 31, 18, 0.72)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                centerText('Paused', 'Click the field to play');
            }
        }

        /* =========================================================
           8. MAIN LOOP
           ========================================================= */
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        drawHearts();
        loop();
    </script>

</body>

</html>
